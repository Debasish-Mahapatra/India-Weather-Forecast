name: Update Weather Plot

on:
  schedule:
    # Runs at 01:00 and 13:00 UTC (Approx 6:30 AM and 6:30 PM IST)
    # This ensures the ECMWF data is actually ready before we start.
    - cron: '0 1,13 * * *'
  workflow_dispatch:

concurrency:
  group: update-weather-plot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ECMWF_OPEN_DATA_SOURCE: azure
      FORECAST_MODELS: ifs,aifs-single
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libgeos-dev libproj-dev proj-bin

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python Script
        run: python ifs_code.py

      - name: Commit and Push Images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add plot_*.png
          git diff --cached --quiet && exit 0
          git commit -m "Automated weather plot update"
          git push origin main
